name: Trigger deploy on ai-verity/vaisalesUI

on:
  push:
    branches:
      - charlie

jobs:
  trigger-deploy:
    name: Dispatch deploy-charlie.yml
    runs-on: ubuntu-latest

    steps:
      - name: Trigger workflow_dispatch on ai-verity/vaisalesUI
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.AIVERITY_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/ai-verity/vaisalesUI/actions/workflows/deploy-charlie.yml/dispatches \
            -d '{"ref":"main"}' \
            --fail-with-body
