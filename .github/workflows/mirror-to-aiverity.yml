name: Mirror → ai-verity/vaisalesUI

on:
  push:
    branches:
      - charlie

jobs:
  mirror:
    name: Push code + DB to ai-verity/vaisalesUI:charlie
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to ai-verity/vaisalesUI:charlie
        run: |
          git remote add mirror https://x-access-token:${{ secrets.AIVERITY_PAT }}@github.com/ai-verity/vaisalesUI.git
          git push mirror HEAD:charlie --force
        env:
          GIT_TERMINAL_PROMPT: "0"
